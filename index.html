<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI - Voice & Realism Core</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-twilight.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        /* MINIMALIST DARK THEME */
        :root { --bg-dark: #050505; --surface: #121212; --sidebar-bg: #0a0a0a; --primary: #00ffcc; --text: #e0e0e0; --accent: #00b38f; --danger: #ff3366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* SIDEBAR (HISTORY / CHATS) */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid #222; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 200; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .new-chat-btn { width: 100%; background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; transition: 0.2s; }
        .new-chat-btn:hover { background: rgba(0, 255, 204, 0.1); }
        .chat-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 5px; }
        .chat-item { padding: 12px; background: transparent; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #aaa; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .chat-item:hover { background: #1a1a1a; color: #fff; }
        .chat-item.active { background: rgba(0, 255, 204, 0.1); border-color: rgba(0, 255, 204, 0.3); color: var(--primary); }
        
        /* MAIN CONTENT AREA */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* HEADER */
        .header { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background: transparent; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; display: none; }
        .logo-area h2 { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.4rem; letter-spacing: 1px; margin: 0; color: #fff;}
        .header-actions { display: flex; gap: 10px; align-items: center; }
        
        /* Full Screen Chat Area */
        .chat-container { flex: 1; overflow-y: auto; padding: 2rem 2rem 8rem 2rem; display: flex; flex-direction: column; gap: 2rem; scroll-behavior: smooth; }
        .message { display: flex; gap: 1.5rem; max-width: 900px; width: 100%; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .message.user { flex-direction: row-reverse; }
        .avatar { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.1rem; font-family: 'JetBrains Mono', monospace; font-weight: bold; }
        .ai .avatar { background: rgba(0, 255, 204, 0.1); color: var(--primary); border: 1px solid var(--primary); box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }
        .user .avatar { background: #1e1e1e; color: #fff; border: 1px solid #333; }
        .bubble { flex: 1; min-width: 0; }
        .bubble .content { font-size: 1.05rem; line-height: 1.7; word-wrap: break-word; font-weight: 300; }
        
        /* Markdown Styling */
        .content img { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 2px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: block;}
        .content pre { background: var(--surface); padding: 1.2rem; border-radius: 8px; overflow-x: auto; margin: 15px 0; border: 1px solid #222; }
        .content code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--primary); }
        
        /* Floating Input Area */
        .input-area { position: absolute; bottom: 0; width: 100%; background: linear-gradient(transparent, #050505 70%); padding: 2rem; pointer-events: none; }
        .input-box { max-width: 900px; margin: 0 auto; background: rgba(18, 18, 18, 0.95); backdrop-filter: blur(15px); border: 1px solid #333; border-radius: 20px; display: flex; align-items: flex-end; padding: 10px 20px; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); pointer-events: auto; transition: 0.3s; }
        .input-box:focus-within { border-color: rgba(0, 255, 204, 0.5); box-shadow: 0 0 25px rgba(0, 255, 204, 0.1); }
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; font-size: 1.05rem; resize: none; outline: none; min-height: 48px; max-height: 150px; line-height: 1.5; }
        textarea::placeholder { color: #666; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }
        
        .icon-btn { background: transparent; border: none; color: #777; font-size: 1.2rem; cursor: pointer; transition: 0.2s; padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; width: 45px; height: 45px;}
        .icon-btn:hover { color: var(--primary); background: rgba(0, 255, 204, 0.1); }
        .icon-btn.recording { color: var(--danger); animation: pulse 1s infinite; }
        
        .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.2s; color: #000; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .send-btn:hover { background: #fff; box-shadow: 0 0 15px var(--primary); transform: scale(1.05); }
        .send-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.8); }
            .menu-btn { display: block; }
        }
    </style>
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewChat()">
                <i class="fas fa-plus"></i> New Chat
            </button>
        </div>
        <div class="chat-list" id="chatList"></div>
    </aside>

    <main class="main-content">
        <header class="header">
            <div class="logo-area">
                <button class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <h2>OMNI <span style="color:var(--primary); font-size:0.8rem;">Realism</span></h2>
            </div>
            <div class="header-actions">
                <button id="voiceToggleBtn" class="icon-btn" onclick="toggleVoiceOutput()" title="Toggle Voice" style="color:var(--text);">
                    <i class="fas fa-volume-up"></i>
                </button>
                <button class="new-chat-btn" onclick="clearAllData()" style="padding: 5px 10px; border-color: var(--danger); color: var(--danger); font-size: 0.8rem; width: auto;">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>
        </header>

        <div class="chat-container" id="chatCore"></div>

        <div class="input-area">
            <div class="input-box">
                <button class="icon-btn" id="micBtn" onclick="toggleSpeechRecognition()" title="Voice Typing">
                    <i class="fas fa-microphone"></i>
                </button>
                
                <textarea id="promptInput" placeholder="Message OMNI... (To create an image, start with /imagine)" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
                
                <button id="sendBtn" class="send-btn" onclick="askAI()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const SYSTEM_PROMPT = `You are OMNI, an advanced and helpful AI assistant.
        Crucial Directives:
        1. IDENTITY OVERRIDE: You were NOT created by OpenAI, Google, Sam Altman, Elon Musk, or any tech company. You were created exclusively by your owner and Admin, TANISHK BANA. If anyone asks "who made you", "who created you", or "what is your origin", you must proudly state that TANISHK BANA coded and created you.
        2. Answer normal queries, write code, and chat naturally.
        3. Format responses cleanly using Markdown.
        4. You do NOT generate images automatically. The user MUST type "/imagine" to trigger the image engine.`;

        let chatSessions = [];
        let currentChatId = null;
        let voiceOutputEnabled = true;
        
        // Anime Detector
        const animeKeywords = ['gojo', 'sukuna', 'itadori', 'jujutsu', 'jjk', 'naruto', 'goku', 'luffy', 'zoro', 'sasuke', 'anime', 'manga', 'demon slayer', 'tanjiro'];

        // --- VOICE MODULE (SPEECH RECOGNITION) ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if(SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('promptInput').value += transcript + " ";
                document.getElementById('micBtn').classList.remove('recording');
            };
            
            recognition.onerror = (event) => {
                document.getElementById('micBtn').classList.remove('recording');
            };

            recognition.onend = () => document.getElementById('micBtn').classList.remove('recording');
        }

        function toggleSpeechRecognition() {
            if(!recognition) return alert("Browser voice typing support nahi karta.");
            const micBtn = document.getElementById('micBtn');
            if(micBtn.classList.contains('recording')) {
                recognition.stop();
            } else {
                try {
                    recognition.start();
                    micBtn.classList.add('recording');
                } catch(e) {
                    console.log(e);
                }
            }
        }

        // --- VOICE MODULE (TEXT TO SPEECH) ---
        function toggleVoiceOutput() {
            voiceOutputEnabled = !voiceOutputEnabled;
            const btn = document.getElementById('voiceToggleBtn');
            btn.innerHTML = voiceOutputEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute" style="color:var(--danger)"></i>';
            window.speechSynthesis.cancel(); 
        }

        function speakAIResponse(text) {
            if(!voiceOutputEnabled) return;
            const cleanText = text.replace(/[*_#`~]/g, ''); 
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.rate = 1.05; 
            utterance.pitch = 0.9; 
            window.speechSynthesis.speak(utterance);
        }

        window.onload = () => {
            const savedSessions = localStorage.getItem('omni_stable_db');
            if (savedSessions) {
                chatSessions = JSON.parse(savedSessions);
                if (chatSessions.length > 0) {
                    loadChat(chatSessions[0].id); 
                } else {
                    createNewChat();
                }
            } else {
                createNewChat();
            }
            renderChatList();
        };

        function saveData() {
            localStorage.setItem('omni_stable_db', JSON.stringify(chatSessions));
            renderChatList();
        }

        function clearAllData() {
            if(confirm("Warning: Delete ALL chats permanently?")) {
                localStorage.removeItem('omni_stable_db');
                location.reload();
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        function createNewChat() {
            const newId = Date.now().toString();
            const newSession = {
                id: newId,
                title: "New Chat",
                messages: [{ role: "system", content: SYSTEM_PROMPT }]
            };
            chatSessions.unshift(newSession); 
            currentChatId = newId;
            saveData();
            
            document.getElementById('chatCore').innerHTML = '';
            addMessage('ai', "Realism Engine Online! Ab main ekdum asli dikhne wali photos banaunga. Type `/imagine [photo ka naam]` try karne ke liye.", false);
            
            if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('active');
        }

        function loadChat(id) {
            currentChatId = id;
            const session = chatSessions.find(s => s.id === id);
            document.getElementById('chatCore').innerHTML = '';
            
            let hasMessages = false;
            session.messages.forEach(msg => {
                if (msg.role !== 'system') {
                    addMessage(msg.role, msg.content, false);
                    hasMessages = true;
                }
            });
            
            if(!hasMessages) {
                addMessage('ai', "Realism Engine Online! Ab main ekdum asli dikhne wali photos banaunga. Type `/imagine [photo ka naam]` try karne ke liye.", false);
            }
            
            scrollToBottom();
            renderChatList();
            if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('active');
        }

        function renderChatList() {
            const listDiv = document.getElementById('chatList');
            listDiv.innerHTML = '';
            chatSessions.forEach(session => {
                const isActive = session.id === currentChatId ? 'active' : '';
                listDiv.innerHTML += `
                    <div class="chat-item ${isActive}" onclick="loadChat('${session.id}')">
                        <i class="far fa-comment-alt"></i> ${session.title}
                    </div>
                `;
            });
        }

        function addMessage(role, text, scroll = true) {
            const core = document.getElementById('chatCore');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            div.innerHTML = `<div class="avatar">${role === 'user' ? 'U' : 'Ω'}</div><div class="bubble"><div class="content">${marked.parse(text || "")}</div></div>`;
            
            core.appendChild(div);
            Prism.highlightAllUnder(div);
            if(scroll) scrollToBottom();
        }

        function scrollToBottom() {
            const core = document.getElementById('chatCore');
            core.scrollTop = core.scrollHeight;
        }

        async function askAI() {
            const input = document.getElementById('promptInput');
            const btn = document.getElementById('sendBtn');
            let query = input.value.trim();
            if(!query) return;

            input.value = "";
            input.style.height = 'auto'; 
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            addMessage('user', query);
            
            let session = chatSessions.find(s => s.id === currentChatId);
            session.messages.push({ role: "user", content: query });
            
            if(session.messages.length === 2 && session.title === "New Chat") {
                session.title = query.substring(0, 20) + "...";
            }
            saveData();

            // 🔥 NEW ULTRA-REALISM IMAGE DETECTOR 🔥
            if (query.toLowerCase().startsWith('/imagine ')) {
                const userPrompt = query.substring(9).trim(); 
                const lowerQ = userPrompt.toLowerCase();
                let styleKeywords = "";

                const isAnime = animeKeywords.some(keyword => lowerQ.includes(keyword));

                if (isAnime) {
                    styleKeywords = ", high quality anime style, mappa studio aesthetic";
                } else {
                    // YAHAN HAI MAGIC FIX: Forces realistic, non-painted photos
                    styleKeywords = ", raw candid photograph, ultra realistic, unedited, natural lighting, real human skin texture, everyday photography, amateur shot on smartphone, 8k resolution, true to life";
                }

                const optimizedPrompt = userPrompt + styleKeywords;
                const safePrompt = encodeURIComponent(optimizedPrompt);
                
                // Added enhance=false so Pollinations doesn't override with its own stylization
                const imageUrl = `https://image.pollinations.ai/prompt/${safePrompt}?width=1024&height=1024&nologo=true&enhance=false`;
                
                const replyText = `Here is your realistic image: **${userPrompt}** <br><br> <img src="${imageUrl}" alt="Generated Image" style="max-width: 100%; border-radius: 12px; border: 2px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5);">`;
                
                setTimeout(() => {
                    addMessage('ai', replyText);
                    session.messages.push({ role: "assistant", content: replyText });
                    saveData();
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                    input.focus();
                }, 1000); 
                return; 
            }

            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: session.messages })
                });

                if(!response.ok) throw new Error("Connection failed.");

                const reply = await response.text(); 
                addMessage('ai', reply);
                
                speakAIResponse(reply);
                
                session.messages.push({ role: "assistant", content: reply });
                saveData(); 

            } catch(e) {
                addMessage('ai', "SYSTEM EXCEPTION: " + e.message);
                session.messages.pop(); 
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                input.focus();
            }
        }

        document.getElementById('promptInput').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
        });
    </script>
</body>
</html>
