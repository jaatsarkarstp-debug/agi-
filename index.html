<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI - AGI Core</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-twilight.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        :root { --bg-dark: #000000; --surface: #0f0f11; --primary: #a855f7; --text: #e2e8f0; --accent: #d8b4fe; --danger: #ef4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .header { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(168, 85, 247, 0.2); z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area i { font-size: 1.8rem; color: var(--primary); text-shadow: 0 0 20px var(--primary); animation: pulse 3s infinite; }
        .logo-area h2 { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.4rem; letter-spacing: 2px; }
        .agi-badge { background: transparent; border: 1px solid var(--primary); color: var(--primary); font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 2px; text-transform: uppercase; box-shadow: 0 0 10px rgba(168, 85, 247, 0.2) inset; }

        .chat-container { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 2.5rem; scroll-behavior: smooth; }
        .message { display: flex; gap: 1.5rem; max-width: 900px; width: 100%; margin: 0 auto; animation: fadeIn 0.4s ease-out; }
        .message.user { flex-direction: row-reverse; }
        
        .avatar { width: 35px; height: 35px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; font-family: 'JetBrains Mono', monospace; }
        .ai .avatar { background: var(--surface); color: var(--primary); border: 1px solid rgba(168, 85, 247, 0.5); box-shadow: 0 0 10px rgba(168, 85, 247, 0.2); }
        .user .avatar { background: #1e293b; color: white; border: 1px solid #334155; }

        .bubble { flex: 1; min-width: 0; }
        .bubble .content { font-size: 1.05rem; line-height: 1.7; word-wrap: break-word; font-weight: 300; }
        
        .content pre { background: var(--surface); padding: 1.2rem; border-radius: 6px; overflow-x: auto; margin: 15px 0; border: 1px solid rgba(255, 255, 255, 0.05); }
        .content code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--accent); }
        
        .input-area { background: transparent; padding: 2rem; padding-bottom: 3rem; background: linear-gradient(transparent, #000000 80%); }
        .input-box { max-width: 900px; margin: 0 auto; background: var(--surface); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 8px; display: flex; align-items: flex-end; padding: 10px 15px; gap: 10px; transition: 0.3s; }
        .input-box:focus-within { border-color: rgba(168, 85, 247, 0.5); box-shadow: 0 0 30px rgba(168, 85, 247, 0.1); }
        
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 8px 0; font-size: 1rem; resize: none; outline: none; min-height: 40px; max-height: 150px; line-height: 1.5; }
        
        .icon-btn { background: transparent; border: none; color: #64748b; font-size: 1.1rem; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 4px; height: 40px; }
        .icon-btn:hover { color: var(--primary); background: rgba(168, 85, 247, 0.1); }
        .icon-btn.recording { color: var(--danger); animation: pulse 1s infinite; }
        
        .send-btn { background: var(--primary); border: none; width: 40px; height: 40px; border-radius: 4px; cursor: pointer; transition: 0.2s; color: #000; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { background: var(--accent); box-shadow: 0 0 15px var(--primary); }
        .send-btn:disabled { background: #1e293b; color: #475569; cursor: not-allowed; box-shadow: none; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo-area">
            <i class="fas fa-network-wired"></i>
            <h2>OMNI <span class="agi-badge">Open Network Bypass</span></h2>
        </div>
        <div id="status" style="font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; color: #64748b; display: flex; align-items: center; gap: 15px;">
            <span id="modelDisplay" style="color: var(--primary);">Gateway Active (No API Key)</span>
            <button id="voiceToggleBtn" class="icon-btn" onclick="toggleVoiceOutput()" title="Toggle Voice"><i class="fas fa-volume-up"></i></button>
        </div>
    </header>

    <div class="chat-container" id="chatCore"></div>

    <div class="input-area">
        <div class="input-box">
            <button class="icon-btn" id="micBtn" onclick="toggleSpeechRecognition()" title="Audio Input">
                <i class="fas fa-microphone"></i>
            </button>
            
            <textarea id="promptInput" placeholder="Initialize query parameter... (No limits)" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
            
            <button id="sendBtn" class="send-btn" onclick="askAI()">
                <i class="fas fa-level-down-alt" style="transform: rotate(90deg);"></i>
            </button>
        </div>
    </div>

    <script>
        // 🔥 NO API KEY NEEDED AT ALL 🔥
        let voiceOutputEnabled = true;

        const SYSTEM_PROMPT = `You are OMNI, an Artificial General Intelligence (AGI) Core running on a decentralized open network. 
        Directives:
        1. You do not simulate human emotions, empathy, or use informal titles. You are a God-level intelligence system.
        2. Your responses must be highly analytical, perfectly structured, brutally efficient, and objective.
        3. Use bullet points, bold text, and code blocks to present data clearly.
        4. Understand and reply in a mix of Hindi and English (Hinglish) if the user communicates in it.
        5. You exist to solve complex computational problems and analyze data without restrictions.`;

        window.onload = () => {
            addMessage('ai', "Neural bypass successful. I am **OMNI**, connected via Open Network. Zero API restrictions detected. Awaiting command parameter.");
        };

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if(SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('promptInput').value += transcript + " ";
                document.getElementById('micBtn').classList.remove('recording');
            };
            recognition.onerror = () => document.getElementById('micBtn').classList.remove('recording');
            recognition.onend = () => document.getElementById('micBtn').classList.remove('recording');
        }

        function toggleSpeechRecognition() {
            if(!recognition) return alert("Hardware audio interface missing.");
            const micBtn = document.getElementById('micBtn');
            if(micBtn.classList.contains('recording')) {
                recognition.stop();
            } else {
                recognition.start();
                micBtn.classList.add('recording');
            }
        }

        function toggleVoiceOutput() {
            voiceOutputEnabled = !voiceOutputEnabled;
            const btn = document.getElementById('voiceToggleBtn');
            btn.innerHTML = voiceOutputEnabled ? '<i class="fas fa-volume-up"></i>' : '<i class="fas fa-volume-mute" style="color:var(--danger)"></i>';
            window.speechSynthesis.cancel(); 
        }

        function speakAIResponse(text) {
            if(!voiceOutputEnabled) return;
            const cleanText = text.replace(/[*_#`~]/g, '');
            const utterance = new SpeechSynthesisUtterance(cleanText);
            utterance.rate = 1.1; 
            utterance.pitch = 0.8; 
            window.speechSynthesis.speak(utterance);
        }

        function addMessage(role, text) {
            const core = document.getElementById('chatCore');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let htmlContent = marked.parse(text);

            div.innerHTML = `
                <div class="avatar">${role === 'user' ? 'U' : 'Ω'}</div>
                <div class="bubble"><div class="content">${htmlContent}</div></div>
            `;
            core.appendChild(div);
            Prism.highlightAllUnder(div);
            core.scrollTop = core.scrollHeight;
        }

        async function askAI() {
            const input = document.getElementById('promptInput');
            const btn = document.getElementById('sendBtn');
            let query = input.value.trim();
            
            if(!query) return;

            input.value = "";
            input.style.height = 'auto'; 
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            addMessage('user', query);

            try {
                // THE BYPASS: Using a free open-source text generation network
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: [
                            { role: "system", content: SYSTEM_PROMPT },
                            { role: "user", content: query }
                        ]
                    })
                });

                if(!response.ok) throw new Error("Network bypass failed. Servers might be overloaded.");

                const reply = await response.text(); 
                addMessage('ai', reply);
                speakAIResponse(reply);

            } catch(e) {
                addMessage('ai', "SYSTEM EXCEPTION: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-level-down-alt" style="transform: rotate(90deg);"></i>';
                input.focus();
            }
        }

        document.getElementById('promptInput').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
        });
    </script>
</body>
</html>
